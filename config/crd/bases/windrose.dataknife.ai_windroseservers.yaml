        description: WindroseServer is the Schema for the windroseservers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              WindroseServerSpec defines the desired state of a Windrose dedicated game server.
              Settings map to ServerDescription.json fields documented at
              https://playwindrose.com/dedicated-server-guide and the official Docker image
              https://hub.docker.com/r/windroseserver/windroseserver
            properties:
              autoLoadLatestBackupIfHasBroken:
                default: true
                description: AutoLoadLatestBackupIfHasBroken restores broken saves
