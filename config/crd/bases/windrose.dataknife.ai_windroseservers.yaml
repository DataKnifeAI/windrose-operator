                description: ServerImage is the official Windrose Linux server container
                  image.
                type: string
              serverName:
                description: ServerName is shown in the server browser when invite
                  codes look similar.
                type: string
              storageClassName:
                description: StorageClassName selects the StorageClass for persistent
                  saves.
                type: string
              storageSize:
                default: 35Gi
                description: StorageSize is the requested PVC capacity for world saves.
                type: string
              useDirectConnection:
                default: true
                description: UseDirectConnection enables direct IP connections (required
                  for Kubernetes).
                type: boolean
              userSelectedRegion:
                description: |-
                  UserSelectedRegion selects the connection service region: SEA, CIS, or EU.
                  Leave empty to auto-detect based on latency.
                enum:
