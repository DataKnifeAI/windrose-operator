                format: int32
                maximum: 65535
                minimum: 1024
                type: integer
              gateway:
                description: Gateway configures Envoy Gateway exposure (required).
                properties:
                  address:
                    description: Address is the external IP assigned to this server
                      (Kube-VIP or MetalLB).
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
                    type: string
                  className:
                    default: envoy
                    description: ClassName is the GatewayClass used for the Envoy
                      Gateway controller.
                    type: string
                  envoyProxyName:
                    description: |-
                      EnvoyProxyName overrides the EnvoyProxy resource name.
                      Default: game-{base-name}-kubevip.
                    type: string
                  externalTrafficPolicy:
                    default: Cluster
                    description: ExternalTrafficPolicy for the Envoy LoadBalancer
                      service.
                    enum:
                    - Cluster
                    - Local
                    type: string
                  gatewayName:
                    description: |-
                      GatewayName overrides the Gateway resource name.
                      Default: {base-name}-gateway where base-name strips a trailing "-server" suffix.
                    type: string
                required:
                - address
                type: object
              imagePullPolicy:
                default: IfNotPresent
                description: ImagePullPolicy for the game server container.
                type: string
              imagePullSecrets:
                description: ImagePullSecrets for private registries.
                items:
                  description: |-
                    LocalObjectReference contains enough information to let you locate the
                    referenced object inside the same namespace.
                  properties:
                    name:
                      default: ""
                      description: |-
                        Name of the referent.
                        This field is effectively required, but due to backwards compatibility is
                        allowed to be empty. Instances of this type with an empty value here are
                        almost certainly wrong.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
              inviteCode:
                description: InviteCode is used when UseDirectConnection is false.
                  Minimum 6 characters.
                maxLength: 32
                minLength: 6
                type: string
              maxPlayerCount:
                default: 4
                description: |-
                  MaxPlayerCount is the maximum number of simultaneous players.
