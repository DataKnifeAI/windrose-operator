# GitLab CI: test/build the operator, publish image to Harbor
#
# Workflow: main or tag → build → publish windrose-operator to Harbor
#
# Harbor variables are inherited from the dk-raas/dkai GitLab group:
#   HARBOR_REGISTRY, HARBOR_PROJECT, HARBOR_USERNAME, HARBOR_PASSWORD, DOCKER_AUTH_CONFIG

stages:
  - build
  - docker

variables:
  IMAGE_NAME: windrose-operator
  HARBOR_PROJECT: library

.build_template: &build_template
  image: golang:1.25-alpine
  before_script:
    - cd "$CI_PROJECT_DIR"
    - apk add --no-cache git make
    - go version
    - go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.17.2
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0
    - export PATH="$(go env GOPATH)/bin:$PATH"

build:
  stage: build
  <<: *build_template
  script:
    - go mod download
    # Alpine has no CGO by default; skip -race (GitHub Actions runs race tests on ubuntu)
    - make generate manifests vet lint
    - go test ./... -coverprofile cover.out
    - make build
  artifacts:
    paths:
      - bin/manager
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

.docker_build_template: &docker_build_template
  stage: docker
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  tags:
    - kubernetes

publish-windrose-operator:
  <<: *docker_build_template
  script:
    - |
      if [ -z "$HARBOR_REGISTRY" ] || [ -z "$HARBOR_PROJECT" ]; then
        echo "❌ Error: HARBOR_REGISTRY or HARBOR_PROJECT not set"
        echo "HARBOR_REGISTRY: ${HARBOR_REGISTRY:-NOT SET}"
        echo "HARBOR_PROJECT: ${HARBOR_PROJECT:-NOT SET}"
        exit 1
      fi

      HARBOR_AUTH_USER="${HARBOR_USERNAME:-${HARBOR_USER:-}}"
      if [ -n "$HARBOR_AUTH_USER" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
        AUTH=$(printf '%s' "$HARBOR_AUTH_USER:$HARBOR_PASSWORD" | base64 | tr -d '\n')
        mkdir -p ~/.docker
        echo "{\"auths\":{\"$HARBOR_REGISTRY\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json
      fi

      echo "Building windrose-operator image..."
      echo "Registry: $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME"

      IMAGE_TAG="${CI_COMMIT_SHORT_SHA:-$CI_PIPELINE_ID}"
      OUTPUT_FLAGS="--output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest,push=true"
      OUTPUT_FLAGS="$OUTPUT_FLAGS --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG,push=true"

      if [ -n "$CI_COMMIT_TAG" ]; then
        OUTPUT_FLAGS="$OUTPUT_FLAGS --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$CI_COMMIT_TAG,push=true"
      fi

      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        $OUTPUT_FLAGS
